<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>arXiv Daily Digest</title>
<style>
  :root{
    --bg:#ffffff; --panel:#f7f7f8; --border:#e5e7eb; --text:#1f2328;
    --muted:#6b7280; --accent:#b31b1b; --accent-soft:#fbeaea; --code:#f2f2f4;
    --chip:#eef0f2;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0d1117; --panel:#0f141b; --border:#232a33; --text:#e6edf3;
      --muted:#8b949e; --accent:#ff6b6b; --accent-soft:#25191a; --code:#161b22;
      --chip:#1b2129;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
    display:flex; height:100vh; overflow:hidden;
  }
  a{color:var(--accent); text-decoration:none}
  a:hover{text-decoration:underline}

  #sidebar{width:310px; flex:0 0 310px; background:var(--panel); border-right:1px solid var(--border);
    display:flex; flex-direction:column; height:100%}
  #brand{padding:16px 18px 12px; border-bottom:1px solid var(--border)}
  #brand h1{font-size:15px; margin:0}
  #brand p{margin:4px 0 0; font-size:12px; color:var(--muted)}
  .tabs{display:flex; gap:6px; margin:12px 0 8px}
  .tab{flex:1; text-align:center; font-size:12.5px; padding:6px 0; border:1px solid var(--border);
    border-radius:7px; cursor:pointer; color:var(--muted); background:var(--bg)}
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent)}
  #search{width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:7px;
    background:var(--bg); color:var(--text); font-size:13px}
  #list{overflow-y:auto; padding:6px 8px 48px; flex:1}

  .grp{padding:14px 12px 4px; font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.08em}
  .item{display:flex; gap:8px; align-items:baseline; padding:7px 12px; border-radius:8px;
    color:var(--text); font-size:13px; line-height:1.35; cursor:pointer}
  .item:hover{background:var(--accent-soft)}
  .item.active{background:var(--accent); color:#fff}
  .item.active .day,.item.active .cnt{color:#fff}
  .day{flex:0 0 30px; font-variant-numeric:tabular-nums; font-weight:600; color:var(--muted)}
  .ttl{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .badge{flex:0 0 auto; font-size:9px; font-weight:700; padding:1px 5px; border-radius:5px; background:var(--border); color:var(--muted)}
  .tagrow .ttl{font-variant-numeric:tabular-nums}
  .cnt{flex:0 0 auto; font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums}

  #main{flex:1; overflow-y:auto; height:100%}
  article{max-width:800px; margin:0 auto; padding:44px 40px 120px}
  article h1{font-size:25px; line-height:1.25; margin:0 0 18px; padding-bottom:12px; border-bottom:2px solid var(--border)}
  article h2{font-size:19px; margin:32px 0 12px}
  article h3{font-size:16px; margin:24px 0 8px}
  article p,article li{font-size:15px; line-height:1.72}
  article ul{padding-left:22px}
  article hr{border:none; border-top:1px solid var(--border); margin:24px 0}
  article blockquote{margin:14px 0; padding:8px 16px; border-left:3px solid var(--accent); background:var(--accent-soft); border-radius:0 6px 6px 0}
  article code{background:var(--code); padding:.15em .4em; border-radius:4px; font-size:.88em}
  article pre{background:var(--code); padding:14px; border-radius:8px; overflow-x:auto}
  article table{border-collapse:collapse; width:100%; margin:14px 0; font-size:13.5px; display:block; overflow-x:auto}
  article th,article td{border:1px solid var(--border); padding:8px 11px; text-align:left; vertical-align:top}
  article thead th{background:var(--panel)}
  article tbody tr:nth-child(even){background:var(--panel)}

  /* papers / tag results */
  .papers{list-style:none; padding:0; margin:0}
  .paper{padding:14px 0; border-bottom:1px solid var(--border)}
  .paper a.pt{font-size:15.5px; font-weight:600; line-height:1.4}
  .paper .meta{margin-top:5px; font-size:12.5px; color:var(--muted)}
  .paper .meta a{color:var(--muted)}
  .chips{margin-top:7px; display:flex; flex-wrap:wrap; gap:6px}
  .chip{font-size:11px; padding:2px 8px; border-radius:20px; background:var(--chip); color:var(--muted); cursor:pointer; border:1px solid transparent}
  .chip:hover{border-color:var(--accent); color:var(--accent)}
  .chip.on{background:var(--accent); color:#fff}

  #menu-btn{display:none}
  @media (max-width:820px){
    body{flex-direction:column; overflow:auto; height:auto}
    #sidebar{width:100%; flex:none; max-height:52vh; border-right:none; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5}
    #sidebar.collapsed #list{display:none}
    #main{overflow:visible}
    article{padding:26px 18px 80px}
    #menu-btn{display:inline-block; float:right; font-size:12px; background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:3px 9px; cursor:pointer}
  }
</style>
</head>
<body>
  <aside id="sidebar">
    <div id="brand">
      <button id="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">목록</button>
      <h1>arXiv Daily Digest</h1>
      <p id="sub">cs.CV 논문 선별·요약</p>
      <div class="tabs">
        <div class="tab active" id="tab-reports" onclick="setMode('reports')">리포트</div>
        <div class="tab" id="tab-tags" onclick="setMode('tags')">태그</div>
      </div>
      <input id="search" placeholder="제목·태그 검색…" oninput="onSearch(this.value)" autocomplete="off">
    </div>
    <nav id="list"></nav>
  </aside>
  <main id="main"><article id="content">불러오는 중…</article></main>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
const listEl = document.getElementById('list');
const contentEl = document.getElementById('content');
const subEl = document.getElementById('sub');
let M = {reports:[], papers:[], tags:[]};
let mode = 'reports';

const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function setMode(m){
  mode = m;
  document.getElementById('tab-reports').classList.toggle('active', m==='reports');
  document.getElementById('tab-tags').classList.toggle('active', m==='tags');
  renderSidebar();
}

function renderSidebar(activePath){
  if(mode==='reports'){
    let html='', cur='';
    for(const e of M.reports){
      const g = e.date ? e.date.slice(0,7).replace('-','.') : '기타';
      if(g!==cur){ html+=`<div class="grp">${g}</div>`; cur=g; }
      const day = e.date ? e.date.slice(8,10) : '·';
      html += `<div class="item${e.path===activePath?' active':''}" data-path="${esc(e.path)}" onclick="load('${esc(e.path)}')">`
        + `<span class="day">${day}</span><span class="ttl">${esc(e.title)}</span>`
        + (e.cat==='AI'?`<span class="badge">AI</span>`:'') + `</div>`;
    }
    listEl.innerHTML = html;
  }else{
    listEl.innerHTML = M.tags.map(t=>
      `<div class="item tagrow" onclick="selectTag('${esc(t.tag)}')">`
      + `<span class="ttl">${esc(t.tag)}</span><span class="cnt">${t.count}</span></div>`).join('');
  }
}

async function load(path){
  location.hash = path;
}
async function renderReport(path){
  setMode('reports'); renderSidebar(path);
  document.querySelectorAll('.item').forEach(el=>el.classList.toggle('active', el.dataset.path===path));
  document.getElementById('sidebar').classList.add('collapsed');
  contentEl.innerHTML='불러오는 중…';
  try{
    const md = await (await fetch(path+'?_='+Date.now())).text();
    contentEl.innerHTML = window.marked ? marked.parse(md) : '<pre>'+esc(md)+'</pre>';
  }catch(e){ contentEl.innerHTML='<p>불러오지 못했습니다: '+esc(path)+'</p>'; }
  document.getElementById('main').scrollTop=0; window.scrollTo(0,0);
}

function paperListHTML(papers, heading){
  const rows = papers.map(p=>{
    const chips = (p.tags||[]).map(t=>`<span class="chip" onclick="selectTag('${esc(t)}')">${esc(t)}</span>`).join('');
    return `<li class="paper"><a class="pt" href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a>`
      + `<div class="meta"><a href="#${esc(p.report)}">${esc(p.date)} 리포트</a></div>`
      + `<div class="chips">${chips}</div></li>`;
  }).join('');
  return `<h1>${esc(heading)}</h1><ul class="papers">${rows||'<p>결과 없음</p>'}</ul>`;
}

function selectTag(tag){
  setMode('tags');
  document.querySelectorAll('#list .item').forEach(el=>el.classList.toggle('active', el.querySelector('.ttl')?.textContent===tag));
  document.getElementById('sidebar').classList.add('collapsed');
  const ps = M.papers.filter(p=>(p.tags||[]).includes(tag));
  contentEl.innerHTML = paperListHTML(ps, `태그: ${tag} · ${ps.length}편`);
  document.getElementById('main').scrollTop=0; window.scrollTo(0,0);
}

function onSearch(q){
  q = q.trim().toLowerCase();
  if(!q){ // 검색 해제 → 현재 모드 기본 화면
    if(location.hash) renderReport(decodeURIComponent(location.hash.slice(1)));
    else if(M.reports[0]) renderReport(M.reports[0].path);
    return;
  }
  const ps = M.papers.filter(p=>
    p.title.toLowerCase().includes(q) || (p.tags||[]).some(t=>t.includes(q)));
  contentEl.innerHTML = paperListHTML(ps, `검색: "${q}" · ${ps.length}편`);
  document.getElementById('main').scrollTop=0; window.scrollTo(0,0);
}

function onHash(){
  const h = decodeURIComponent(location.hash.slice(1));
  if(!h) return;
  if(h.startsWith('tag=')) selectTag(h.slice(4));
  else renderReport(h);
}

async function init(){
  try{ M = await (await fetch('manifest.json?_='+Date.now())).json(); }
  catch(e){ contentEl.innerHTML='<p>manifest.json을 불러오지 못했습니다.</p>'; return; }
  if(M.reports.length){
    subEl.textContent = `cs.CV · 리포트 ${M.reports.length} · 논문 ${M.papers.length} · 태그 ${M.tags.length}`;
  }
  renderSidebar();
  if(location.hash) onHash();
  else if(M.reports[0]) renderReport(M.reports[0].path);
}
window.addEventListener('hashchange', onHash);
init();
</script>
</body>
</html>
