<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>arXiv Daily Digest</title>
<style>
  :root{
    --bg:#ffffff; --panel:#f7f7f8; --border:#e5e7eb; --text:#1f2328;
    --muted:#6b7280; --accent:#b31b1b; --accent-soft:#fbeaea; --code:#f2f2f4;
    --shadow:0 1px 3px rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0d1117; --panel:#0f141b; --border:#232a33; --text:#e6edf3;
      --muted:#8b949e; --accent:#ff6b6b; --accent-soft:#25191a; --code:#161b22;
      --shadow:none;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
    display:flex; height:100vh; overflow:hidden;
  }
  a{color:var(--accent); text-decoration:none}
  a:hover{text-decoration:underline}

  /* Sidebar */
  #sidebar{
    width:300px; flex:0 0 300px; background:var(--panel); border-right:1px solid var(--border);
    display:flex; flex-direction:column; height:100%;
  }
  #brand{padding:18px 20px 12px; border-bottom:1px solid var(--border)}
  #brand h1{font-size:15px; margin:0; letter-spacing:.2px}
  #brand p{margin:4px 0 0; font-size:12px; color:var(--muted)}
  #list{overflow-y:auto; padding:8px 8px 40px; flex:1}
  .grp{padding:14px 12px 4px; font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.08em}
  .item{
    display:flex; gap:8px; align-items:baseline; padding:7px 12px; border-radius:8px;
    color:var(--text); font-size:13px; line-height:1.35; cursor:pointer;
  }
  .item:hover{background:var(--accent-soft); text-decoration:none}
  .item.active{background:var(--accent); color:#fff}
  .item.active .badge,.item.active .day{color:#fff}
  .day{flex:0 0 34px; font-variant-numeric:tabular-nums; font-weight:600; color:var(--muted)}
  .ttl{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .badge{flex:0 0 auto; font-size:9px; font-weight:700; padding:1px 5px; border-radius:5px;
    background:var(--border); color:var(--muted)}

  /* Main */
  #main{flex:1; overflow-y:auto; height:100%}
  #topbar{display:none}
  article{max-width:780px; margin:0 auto; padding:48px 40px 120px}
  article h1{font-size:26px; line-height:1.25; margin:0 0 20px; padding-bottom:14px; border-bottom:2px solid var(--border)}
  article h2{font-size:19px; margin:34px 0 12px}
  article h3{font-size:16px; margin:26px 0 8px}
  article p,article li{font-size:15px; line-height:1.72}
  article ul{padding-left:22px}
  article strong{font-weight:700}
  article hr{border:none; border-top:1px solid var(--border); margin:26px 0}
  article blockquote{margin:14px 0; padding:8px 16px; border-left:3px solid var(--accent);
    background:var(--accent-soft); color:var(--text); border-radius:0 6px 6px 0}
  article code{background:var(--code); padding:.15em .4em; border-radius:4px; font-size:.88em}
  article pre{background:var(--code); padding:14px; border-radius:8px; overflow-x:auto}
  article table{border-collapse:collapse; width:100%; margin:14px 0; font-size:13.5px; display:block; overflow-x:auto}
  article th,article td{border:1px solid var(--border); padding:8px 11px; text-align:left; vertical-align:top}
  article thead th{background:var(--panel)}
  article tbody tr:nth-child(even){background:var(--panel)}

  #menu-btn{display:none}
  @media (max-width:820px){
    body{flex-direction:column; overflow:auto; height:auto}
    #sidebar{width:100%; flex:none; max-height:46vh; border-right:none; border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:5}
    #sidebar.collapsed #list{display:none}
    #main{overflow:visible}
    article{padding:28px 20px 80px}
    #menu-btn{display:inline-block; float:right; font-size:12px; background:none; border:1px solid var(--border);
      color:var(--muted); border-radius:6px; padding:3px 9px; cursor:pointer}
  }
</style>
</head>
<body>
  <aside id="sidebar">
    <div id="brand">
      <button id="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">목록</button>
      <h1>arXiv Daily Digest</h1>
      <p id="sub">cs.CV 논문 선별·요약</p>
    </div>
    <nav id="list"></nav>
  </aside>
  <main id="main"><article id="content">불러오는 중…</article></main>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
const listEl = document.getElementById('list');
const contentEl = document.getElementById('content');
const subEl = document.getElementById('sub');
let manifest = [];

function render(items){
  let html = '', curGrp = '';
  for(const e of items){
    const grp = e.date ? e.date.slice(0,7).replace('-', '.') : '기타';
    if(grp !== curGrp){ html += `<div class="grp">${grp}</div>`; curGrp = grp; }
    const day = e.date ? e.date.slice(8,10) : '·';
    html += `<div class="item" data-path="${e.path}" onclick="load('${e.path}')">`
      + `<span class="day">${day}</span>`
      + `<span class="ttl">${escapeHtml(e.title)}</span>`
      + (e.cat==='AI' ? `<span class="badge">AI</span>` : '') + `</div>`;
  }
  listEl.innerHTML = html;
}

function escapeHtml(s){return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function load(path){
  history.replaceState(null,'','#'+path);
  document.querySelectorAll('.item').forEach(el=>el.classList.toggle('active', el.dataset.path===path));
  document.getElementById('sidebar').classList.add('collapsed');
  contentEl.innerHTML = '불러오는 중…';
  try{
    const md = await (await fetch(path + '?_=' + Date.now())).text();
    contentEl.innerHTML = window.marked ? marked.parse(md)
      : '<pre>'+escapeHtml(md)+'</pre>';
    document.getElementById('main').scrollTop = 0;
    window.scrollTo(0,0);
  }catch(err){
    contentEl.innerHTML = '<p>리포트를 불러오지 못했습니다: '+escapeHtml(path)+'</p>';
  }
}

async function init(){
  try{
    manifest = await (await fetch('manifest.json?_=' + Date.now())).json();
  }catch(e){ contentEl.innerHTML='<p>manifest.json을 불러오지 못했습니다.</p>'; return; }
  render(manifest);
  if(manifest.length){
    const latest = manifest[0].date;
    subEl.textContent = `cs.CV 논문 선별·요약 · ${manifest.length}개 리포트 · 최신 ${latest}`;
  }
  const initial = decodeURIComponent(location.hash.slice(1)) || (manifest[0] && manifest[0].path);
  if(initial) load(initial);
}
window.addEventListener('hashchange',()=>{const p=decodeURIComponent(location.hash.slice(1)); if(p) load(p);});
init();
</script>
</body>
</html>
