name: AI Report Scheduler

on:
  # arXiv digest는 로컬/원격 cron 머신(src/run_digest.sh)으로 전환됨.
  # 이중 실행·커밋 충돌 방지를 위해 스케줄 자동 실행을 비활성화하고
  # 수동 실행(workflow_dispatch)만 남긴다. Gemini 파이프라인은 fallback으로 보존.
  # schedule:
  #   - cron: "0 8 * * 1-5" # KST 17:00 (arXiv 발표 ~UTC 01:00 이후 충분한 여유)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync environment
        run: uv sync

      - name: Run main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          LOG_FILE="ai_report_$(date +%Y%m%d).log"
          echo "LOG_FILE=$LOG_FILE" >> $GITHUB_ENV
          if [ -f selected_papers.json ]; then
            echo "Using pre-selected papers from Claude agent..."
            uv run python main.py --from-selection > $LOG_FILE 2>&1
          else
            echo "No selection file, running full pipeline..."
            uv run python main.py > $LOG_FILE 2>&1
          fi

      - name: Print log
        if: always()
        run: cat ${{ env.LOG_FILE }}

      - name: Commit report if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git rm --cached selected_papers.json 2>/dev/null || true
          rm -f selected_papers.json
          git add daily_reports/ README.md
          if ! git diff --cached --quiet; then
            git commit -m "auto: update AI report $(date +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
