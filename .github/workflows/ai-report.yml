name: AI Report Scheduler

on:
  schedule:
    - cron: "0 8 * * 1-5" # KST 17:00 (arXiv 발표 ~UTC 01:00 이후 충분한 여유)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Sync environment
        run: uv sync

      - name: Run main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          LOG_FILE="ai_report_$(date +%Y%m%d).log"
          echo "LOG_FILE=$LOG_FILE" >> $GITHUB_ENV
          uv run python main.py > $LOG_FILE 2>&1

      - name: Print log
        if: always()
        run: cat ${{ env.LOG_FILE }}

      - name: Commit report if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily_reports/ README.md
          if ! git diff --cached --quiet; then
            git commit -m "auto: update AI report $(date +%Y-%m-%d)"
            git push
          fi
